name: Production Database Migration

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  migrate-and-deploy:
    runs-on: ubuntu-latest
    environment: production
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Migration Image
        run: docker build -f Dockerfile.migrate -t migrate-runner .

      - name: Run Schema Migrations
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT_SESSION: ${{ secrets.DB_PORT_SESSION }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          # Build the connection string for the runner
          CONN_STRING="Host=${DB_HOST};Port=${DB_PORT_SESSION};Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD};SslMode=Require;Trust Server Certificate=true;"
          
          # Run the migration container
          docker run --rm -e MIGRATION_DATABASE_URL="$CONN_STRING" migrate-runner

      - name: Trigger Render API Deploy
        if: success()
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/render_response.json -w "%{http_code}" -X POST \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Accept: application/json")
          cat /tmp/render_response.json
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "Render deploy trigger FAILED with HTTP $HTTP_STATUS"
            exit 1
          fi
          echo "Render deploy triggered successfully (HTTP $HTTP_STATUS)"
